<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator Demo</title>
  <script type="module" crossorigin src="/index.js"></script>
  <link rel="stylesheet" crossorigin href="/css/index.css">
</head>
<body>
<div id="app">
  <div class="header">
    <h1>QR Code Generator</h1>
    <div class="controls-right">
      <div class="language-switcher">
        <button id="lang-en" class="lang-button active" data-lang="en">EN</button>
        <button id="lang-ru" class="lang-button" data-lang="ru">RU</button>
      </div>
      <button id="theme-toggle" class="theme-button" aria-label="Toggle theme">🌙</button>
    </div>
  </div>
  <div class="container">
    <div class="controls">
      <div class="control-group">
        <label for="text-input">
          <span data-i18n="textInputLabel">Text to encode</span>
          <span class="tooltip-trigger" data-tooltip-key="textInput" role="button" tabindex="0" aria-expanded="false">?</span>
        </label>
        <textarea id="text-input">https://github.com/alekstar79</textarea>
      </div>

      <div class="control-group">
        <label for="mode-select">
          <span data-i18n="modeSelectLabel">Encoding Mode</span>
          <span class="tooltip-trigger" data-tooltip-key="modeSelect" role="button" tabindex="0" aria-expanded="false">?</span>
        </label>
        <select id="mode-select">
          <option value="-1" selected data-i18n="autoOption">Auto</option>
          <option value="1" data-i18n="numericalOption">Numerical</option>
          <option value="2" data-i18n="alphanumericOption">Alphanumeric</option>
          <option value="4" data-i18n="binaryOption">Binary (UTF8)</option>
        </select>
      </div>

      <div class="control-group">
        <label for="eccl-select">
          <span data-i18n="ecclSelectLabel">Error Correction Level</span>
          <span class="tooltip-trigger" data-tooltip-key="ecclSelect" role="button" tabindex="0" aria-expanded="false">?</span>
        </label>
        <select id="eccl-select">
          <option value="-1" data-i18n="autoOption">Auto</option>
          <option value="1" data-i18n="ecclLOption">Low (L)</option>
          <option value="0" data-i18n="ecclMOption">Medium (M)</option>
          <option value="3" data-i18n="ecclQOption">Quartile (Q)</option>
          <option value="2" selected data-i18n="ecclHOption">High (H)</option>
        </select>
      </div>

      <div class="control-group">
        <label for="version-input">
          <span data-i18n="versionInputLabel">Version (1-40, -1 for Auto)</span>
          <span class="tooltip-trigger" data-tooltip-key="versionInput" role="button" tabindex="0" aria-expanded="false">?</span>
        </label>
        <input type="number" id="version-input" value="-1" min="-1" max="40">
      </div>

      <div class="control-group">
        <label for="mask-input">
          <span data-i18n="maskInputLabel">Mask Pattern (0-7, -1 for Auto)</span>
          <span class="tooltip-trigger" data-tooltip-key="maskInput" role="button" tabindex="0" aria-expanded="false">?</span>
        </label>
        <input type="number" id="mask-input" value="-1" min="-1" max="7">
      </div>

      <div class="control-group">
        <label for="image-format-select">
          <span data-i18n="imageFormatSelectLabel">Image Format</span>
          <span class="tooltip-trigger" data-tooltip-key="imageFormatSelect" role="button" tabindex="0" aria-expanded="false">?</span>
        </label>
        <select id="image-format-select">
          <option value="SVG" selected data-i18n="svgOption">SVG</option>
          <option value="PNG" data-i18n="pngOption">PNG</option>
          <option value="HTML" data-i18n="htmlOption">HTML</option>
        </select>
      </div>

      <div class="control-group">
        <label for="modsize-input">
          <span data-i18n="modsizeInputLabel">Module Size (px)</span>
          <span class="tooltip-trigger" data-tooltip-key="modsizeInput" role="button" tabindex="0" aria-expanded="false">?</span>
        </label>
        <input type="number" id="modsize-input" value="8" min="1">
      </div>

      <div class="control-group">
        <label for="margin-input">
          <span data-i18n="marginInputLabel">Margin (modules)</span>
          <span class="tooltip-trigger" data-tooltip-key="marginInput" role="button" tabindex="0" aria-expanded="false">?</span>
        </label>
        <input type="number" id="margin-input" value="4" min="0">
      </div>

      <button id="generate-btn" data-i18n="generateButton">Generate QR Code</button>
    </div>
    <div class="result-area">
      <div id="qr-code-container"></div>
      <div id="error-container"></div>
      <button id="download-btn" class="hidden" data-i18n="downloadButton">Download</button>
    </div>
  </div>
</div>
</body>
</html>
